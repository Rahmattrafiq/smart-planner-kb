<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Smart Planner{% endblock %} | Dream Career</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="white" stroke-width="1.6" stroke-linejoin="round"/></svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">Smart Planner</div>
        <div class="brand-sub">Dream Career</div>
      </div>
    </div>
    <nav class="nav">
      <a href="{{ url_for('landing') }}" class="nav-item {{ 'active' if request.path == url_for('landing') else '' }}">
        <span class="nav-ic">&#8962;</span> Beranda
      </a>
      <a href="{{ url_for('roadmap_view', mahasiswa_id=mhs.id) if mhs else url_for('input_form') }}"
         class="nav-item {{ 'active' if '/roadmap' in request.path else '' }}">
        <span class="nav-ic">&#128203;</span> Roadmap Saya
      </a>
      <a href="{{ url_for('profil') }}" class="nav-item {{ 'active' if request.path == url_for('profil') else '' }}">
        <span class="nav-ic">&#128100;</span> Profil Saya
      </a>
      <a href="{{ url_for('panduan') }}" class="nav-item {{ 'active' if request.path == url_for('panduan') else '' }}">
        <span class="nav-ic">&#128218;</span> Panduan
      </a>
      <a href="{{ url_for('tentang') }}" class="nav-item {{ 'active' if request.path == url_for('tentang') else '' }}">
        <span class="nav-ic">&#8505;</span> Tentang
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="{{ url_for('landing') }}" class="nav-item nav-item-muted">
        <span class="nav-ic">&#8618;</span> Keluar
      </a>
    </div>
  </aside>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
