{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="static-card" style="max-width: 480px; margin: 20px auto;">
  <h3>Login ke Smart Planner</h3>
  <p class="page-sub" style="margin-bottom: 20px;">Masuk untuk melihat roadmap dan melanjutkan perjalanan kariermu.</p>
  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group" style="margin-bottom: 14px;">
      <label>Email</label>
      <input type="email" name="email" placeholder="contoh@email.com" required>
    </div>
    <div class="form-group" style="margin-bottom: 18px;">
      <label>Password</label>
      <input type="password" name="password" placeholder="Masukkan password" required>
    </div>
    <div class="form-actions" style="justify-content: flex-start; gap: 10px;">
      <button type="submit" class="btn-primary">Masuk</button>
      <a href="{{ url_for('register') }}" class="btn-secondary">Buat Akun</a>
    </div>
  </form>
</div>
{% endblock %}
