{% extends "base.html" %}
{% block title %}Daftar Akun{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-icon">✍️</div>
      <h3>Buat Akun Baru</h3>
      <p class="page-sub">Daftar agar roadmap yang kamu buat tersimpan dan mudah diakses lagi.</p>
    </div>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group" style="margin-bottom: 14px;">
        <label>Nama Lengkap</label>
        <input type="text" name="nama" value="{{ form_data.get('nama', '') }}" placeholder="Nama lengkap" required>
      </div>
      <div class="form-group" style="margin-bottom: 14px;">
        <label>Email</label>
        <input type="email" name="email" value="{{ form_data.get('email', '') }}" placeholder="contoh@email.com" required>
      </div>
      <div class="form-group" style="margin-bottom: 14px;">
        <label>Password</label>
        <input type="password" name="password" placeholder="Minimal 6 karakter" required>
      </div>
      <div class="form-group" style="margin-bottom: 18px;">
        <label>Konfirmasi Password</label>
        <input type="password" name="confirm_password" placeholder="Ulangi password" required>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-primary">Daftar</button>
        <a href="{{ url_for('login') }}" class="btn-secondary">Sudah punya akun?</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
